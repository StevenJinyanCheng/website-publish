<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误日期</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            text-align: center;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: red;
            margin-bottom: 20px;
        }
        
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        
        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">❌</div>
        <h1 id="errorMessage"></h1>
        <button class="btn" onclick="appeal()">申诉</button>
        <button class="btn" onclick="window.location.href='../../index.html?displayBug=1'">返回首页</button>
    </div>

    <script>
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 获取URL参数中的选定日期和当前日期
        const selectedDate = getUrlParameter('selectedDate');
        const currentDate = getUrlParameter('currentDate');

        // 显示错误信息
        const errorMessageElement = document.getElementById('errorMessage');
        errorMessageElement.textContent = `错误，你选择的日期是${selectedDate}，今天是是${currentDate}！`;

        function appeal() {
            // 跳转到申诉页面
            window.location.href = '../shensu/index.html';
        }
    </script>

</body>
</html>
