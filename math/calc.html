<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 1em;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        section {
            padding: 2em;
            display: flex;
            justify-content: center;
        }
        table {
            border-collapse: separate;
            border-spacing: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.12);
            background: #f9f9f9;
            border-radius: 16px;
            padding: 20px 30px 30px 30px;
            table-layout: fixed;
            width: 100%;
            max-width: 350px;
        }
        td {
            width: 33.33%;
            padding: 0;
        }
        input#result {
            width: 100%;
            padding: 18px;
            font-size: 2em;
            text-align: right;
            border: none;
            background: #e3f2fd;
            box-sizing: border-box;
            outline: none;
            border-radius: 8px;
            margin-bottom: 18px;
            color: #333;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        button {
            width: 100%;
            height: 70px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            background: #e0e0e0;
            color: #333;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        button:hover {
            background: #b2dfdb;
        }
        .equals-btn {
            background: #4CAF50;
            color: white;
            font-weight: bold;
        }
        .equals-btn:hover {
            background: #388e3c;
        }
        button[onclick*="clearResult"] {
            background: #f44336;
            color: white;
        }
        button[onclick*="clearResult"]:hover {
            background: #b71c1c;
        }
    </style>
    <script>
        function insert(num) {
            document.getElementById("result").value += num;
        }
        function clearResult() {
            document.getElementById("result").value = "";
        }
    </script>
    <script src="../scripts/calc.js"></script>
</head>
<body>
    <header>
        <h1>Math Calculator</h1>
    </header>
    <section>
        <table>
            <tr>
                <th colspan="3">
                    <input id="result" placeholder="0">
                </th>
            </tr>
            <tr>
                <td><button onclick="insert('1')" style="width: 100%">1</button></td>
                <td><button onclick="insert('2')" style="width: 100%">2</button></td>
                <td><button onclick="insert('3')" style="width: 100%">3</button></td>
            </tr>
            <tr>
                <td><button onclick="insert('4')" style="width: 100%">4</button></td>
                <td><button onclick="insert('5')" style="width: 100%">5</button></td>
                <td><button onclick="insert('6')" style="width: 100%">6</button></td>
            </tr>
            <tr>
                <td><button onclick="insert('7')" style="width: 100%">7</button></td>
                <td><button onclick="insert('8')" style="width: 100%">8</button></td>
                <td><button onclick="insert('9')" style="width: 100%">9</button></td>
            </tr>
            <tr>
                <td><button onclick="insert('0')" style="width: 100%">0</button></td>
                <td><button onclick="insert('+')" style="width: 100%">+</button></td>
                <td><button onclick="insert('-')" style="width: 100%">-</button></td>
            </tr>
            <tr>
                <td><button onclick="insert('*')" style="width: 100%">*</button></td>
                <td><button onclick="insert('/')" style="width: 100%">/</button></td>
                <td><button onclick="insert('**')" style="width: 100%">^</button></td>
            </tr>
            <tr>
                <td><button onclick="insert('(')" style="width: 100%">&#40;</button></td>
                <td><button onclick="insert(')')" style="width: 100%">&#41;</button></td>
                <td><button onclick="insert('.')" style="width: 100%">.</button></td>
            </tr>
            <tr>
                <td><button onclick="clearResult()">C</button></td>
                <td colspan="2"><button class="equals-btn" style="width: 100%" onclick="calcResult()">=</button></td>
            </tr>
        </table>
    </section>
</body>
</html>
